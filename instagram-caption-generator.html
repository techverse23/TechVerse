</head>

<body>

<header>

<div class="logo">

<p>AI & Future Technology</p>
</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>


<section class="hero">

<h2>📸 Instagram Caption Generator</h2>

<p>Create captions instantly with AI style.</p>


<select id="style">

<option value="Professional">Professional</option>
<option value="Funny">Funny</option>
<option value="Motivational">Motivational</option>
<option value="Travel">Travel</option>
<option value="AI">AI</option>

</select>


<br><br>


<input id="topic" placeholder="Example: AI Tools">


<br><br>


<button onclick="gen()">Generate</button>

<button onclick="copyCap()">📋 Copy</button>

<button onclick="downloadCap()">⬇️ Download</button>

<button onclick="clr()">🗑 Clear</button>


<h3>Your Caption</h3>

<div id="out"></div>


</section>



<script>


function gen(){

let style = document.getElementById("style").value;

let topic = document.getElementById("topic").value.trim();

let output = document.getElementById("out");


if(topic === ""){

output.innerText = "Please enter a topic.";

return;

}


let captions = {

Professional:
`Discover ${topic} and take your skills to the next level. 🚀 #Growth #Success`,

Funny:
`${topic}? I wasn't ready for this 😂🔥 #FunnyMoments`,

Motivational:
`Success begins with ${topic}. Keep learning and keep growing! 💪✨`,

Travel:
`Exploring ${topic}, creating memories one step at a time 🌍✈️`,

AI:
`The future of ${topic} starts today 🤖🚀 #ArtificialIntelligence`

};


output.innerText = captions[style];

}



function copyCap(){

let text = document.getElementById("out").innerText;


if(text === ""){

alert("Generate a caption first!");

return;

}


navigator.clipboard.writeText(text);

alert("Caption copied!");

}



function downloadCap(){

let text = document.getElementById("out").innerText;


if(text === ""){

alert("Generate a caption first!");

return;

}


let file = new Blob([text], {type:"text/plain"});


let link = document.createElement("a");


link.href = URL.createObjectURL(file);


link.download = "Instagram-Caption.txt";


link.click();

}



function clr(){

document.getElementById("topic").value="";

document.getElementById("out").innerText="";

}



document.getElementById("topic").addEventListener("keypress", function(e){

if(e.key === "Enter"){

gen();

}

});


</script>
