<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Instagram Caption Generator | TechVerse</title><link rel='stylesheet' href='style-v2.css'></head><body><header><div class='logo'><h1>⚡ TechVerse</h1><p>AI & Future Technology</p></div><nav><a href='index.html'>Home</a> <a href='about.html'>About</a> <a href='contact.html'>Contact</a></nav></header><section class='hero'><h2>📸 Instagram Caption Generator</h2><p>Enter your topic and choose a style.</p><select id='style'><option>Professional</option><option>Funny</option><option>Motivational</option><option>Travel</option><option>AI</option></select><br><br><input id='topic' placeholder='Example: AI Tools'><br><br><button onclick='gen()'>Generate</button> <button onclick='copyCap()'>📋 Copy</button> <button onclick='clr()'>🗑 Clear</button><h3>Your Caption</h3><div id='out'></div></section><script>function gen(){let s=style.value,t=topic.value.trim();if(!t){out.innerText='Please enter a topic.';return;}let c={Professional:`Discover ${t} and take your skills to the next level. 🚀 #Growth`,Funny:`${t}? I wasn't ready for this 😂🔥`,Motivational:`Success starts with ${t}. Keep going! 💪`,Travel:`Exploring ${t}, one adventure at a time 🌍`,AI:`The future of ${t} starts today 🤖✨`};out.innerText=c[s];}function copyCap(){navigator.clipboard.writeText(out.innerText);alert('Caption copied!');}function clr(){topic.value='';out.innerText='';}topic.addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();gen();}});</script><footer><p>© 2026 TechVerse. All Rights Reserved.</p><p>Created by Syed Shahban</p><p><a href='index.html'>Home</a> | <a href='about.html'>About</a> | <a href='contact.html'>Contact</a> | <a href='privacy.html'>Privacy Policy</a></p></footer></body></html>
