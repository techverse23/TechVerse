<section class="hero">

<h2># Free Hashtag Generator</h2>

<p>Type a keyword and get hashtags instantly.</p>

<input type="text" id="keyword" placeholder="Example: AI Tools">

<br><br>

<button onclick="generateHashtags()">Generate</button>

<h3>Your Hashtags</h3>

<p id="result"></p>
<br>

<button onclick="copyHashtags()">📋 Copy Hashtags</button>

<button onclick="clearHashtags()">🗑 Clear</button>
</section>

<script>
function generateHashtags() {

let keyword = document.getElementById("keyword").value.trim();

if(keyword==""){
document.getElementById("result").innerHTML="Please enter a keyword.";
return;
}

let hashtags = "#" + keyword.replace(/\s+/g,"") + "<br>";

if(keyword.toLowerCase().includes("ai")){
hashtags += "#ArtificialIntelligence<br>#ChatGPT<br>#GeminiAI<br>#ClaudeAI<br>#MachineLearning";
}
else if(keyword.toLowerCase().includes("travel")){
hashtags += "#Travel<br>#Adventure<br>#Vacation<br>#Explore<br>#Wanderlust";
}
else if(keyword.toLowerCase().includes("food")){
hashtags += "#Food<br>#Foodie<br>#Cooking<br>#Delicious<br>#Yummy";
}
else{
hashtags += "#Trending<br>#Viral<br>#Success<br>#ContentCreator<br>#DigitalMarketing";
}

document.getElementById("result").innerHTML = hashtags;

}
  function copyHashtags() {

let text = document.getElementById("result").innerText;

navigator.clipboard.writeText(text);

alert("Hashtags copied!");
}

function clearHashtags() {

document.getElementById("keyword").value = "";

document.getElementById("result").innerHTML = "";

  }
  document.getElementById("keyword").addEventListener("keypress", function(event){

if(event.key === "Enter"){
event.preventDefault();
generateHashtags();
}

});
</script>
