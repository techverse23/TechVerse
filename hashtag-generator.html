<section class="hero">

<h2># Free Hashtag Generator</h2>

<p>Type a keyword and get hashtags instantly.</p>

<input type="text" id="keyword" placeholder="Example: AI Tools">

<br><br>

<button onclick="generateHashtags()">Generate</button>

<h3>Your Hashtags</h3>

<p id="result"></p>
<br>

<button onclick="copyHashtags()">📋 Copy Hashtags</button>

<button onclick="clearHashtags()">🗑 Clear</button>
</section>

<script>
function generateHashtags() {

let keyword = document.getElementById("keyword").value.trim();

if(keyword==""){
document.getElementById("result").innerHTML="Please enter a keyword.";
return;
}

document.getElementById("result").innerHTML=
"#"+keyword.replace(/\s+/g,"")+"<br>"+
"#Trending<br>"+
"#Viral<br>"+
"#Tech<br>"+
"#AI<br>"+
"#Innovation<br>"+
"#ContentCreator<br>"+
"#DigitalMarketing<br>"+
"#Growth<br>"+
"#Success";

}
</script>
