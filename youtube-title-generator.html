<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

</head>

<body>

<header>

<div class="logo">

<p>AI & Future Technology</p>

</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="hero">

<h2>🎬 YouTube Title Generator</h2>

<p>Enter your video topic and generate catchy YouTube titles.</p>

<input type="text" id="topic" placeholder="Example: AI Tools">

<br><br>

<button onclick="generateTitles()">Generate Titles</button>

<h3>Generated Titles</h3>

<p id="titles"></p>

</section>

<script>

function generateTitles(){

let topic=document.getElementById("topic").value.trim();

if(topic==""){
document.getElementById("titles").innerHTML="Please enter a topic.";
return;
}

document.getElementById("titles").innerHTML=
"🔥 Top 10 "+topic+" You Must Know<br><br>"+
"🚀 Best "+topic+" in 2026<br><br>"+
"😱 "+topic+" Will Change Your Life<br><br>"+
"💯 Beginner's Guide to "+topic+"<br><br>"+
"⚡ Everything About "+topic;

}

</script>
