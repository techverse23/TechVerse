<section class="hero">
<h2>🎬 YouTube Title Generator</h2>
<p>Enter your video topic and generate titles.</p>

<input id="topic" type="text" placeholder="Example: AI Tools">
<br><br>
<button onclick="generateTitles()">Generate</button>
<button onclick="copyTitles()">📋 Copy</button>
<button onclick="clearTitles()">🗑 Clear</button>

<h3>Generated Titles</h3>
<div id="titles"></div>
</section>

<script>
function generateTitles(){
const topic=document.getElementById("topic").value.trim();
if(!topic){
document.getElementById("titles").innerHTML="Please enter a topic.";
return;
}
const list=[
`🔥 Top 10 ${topic} You Must Know`,
`🚀 Best ${topic} in 2026`,
`💯 Beginner's Guide to ${topic}`,
`😱 ${topic} Secrets Nobody Tells You`,
`⚡ Everything About ${topic}`,
`🎯 ${topic} Tips That Actually Work`,
`🤖 Best AI Tricks for ${topic}`,
`📈 Master ${topic} Fast`,
`✅ ${topic} Explained Simply`,
`🏆 Ultimate ${topic} Guide`
];
document.getElementById("titles").innerHTML=list.join("<br><br>");
}
function copyTitles(){
navigator.clipboard.writeText(document.getElementById("titles").innerText);
alert("Titles copied!");
}
function clearTitles(){
document.getElementById("topic").value="";
document.getElementById("titles").innerHTML="";
}
document.getElementById("topic").addEventListener("keypress",e=>{
if(e.key==="Enter"){e.preventDefault();generateTitles();}
});
</script>
